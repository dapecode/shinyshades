  <!-- ═══════════════════════════════════════════════════════════════════

       Ordered from most-specific to fallback so browsers pick correctly:
         favicon.svg      → modern browsers (scalable, supports dark mode)
         favicon-96x96    → legacy PNG fallback

  <!-- ═══════════════════════════════════════════════════════════════════
       PERFORMANCE — RESOURCE HINTS
       ────────────────────────────────────────────────────────────────
       ORDER MATTERS: hints are processed top-to-bottom.
       Put the most critical origins first.

       preconnect  → opens TCP + TLS handshake immediately.
                     Use for origins whose resources you will definitely
                     download on first paint (Cloudinary, GTM, Pixel).
                     Max 6 simultaneous — don't overuse.

       dns-prefetch → resolves DNS only (cheaper than preconnect).
                     Use for origins that are used later in the page
                     lifecycle (Supabase, Sheets, analytics).

       crossorigin attr on preconnect:
         Required when the resource is fetched with CORS (fonts, scripts
         from a CDN). Without it the browser opens TWO connections —
         one anonymous, one with credentials — doubling TLS cost.
  ═══════════════════════════════════════════════════════════════════ -->

  <!--
    TIER 1 — LCP CRITICAL
    These origins serve content visible on first paint.
    Open connections before the browser has even parsed the <body>.
  -->

  <!-- Cloudinary: hero image, product images, OG image (LCP critical) -->
  <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
  <link rel="dns-prefetch" href="https://res.cloudinary.com" />

  <!-- Google Fonts: Cormorant Garamond + Inter
       Add these when/if you load fonts from Google Fonts CDN.
       They have zero cost if fonts are self-hosted (just remove them).
       Two separate preconnects required: fonts.googleapis.com serves
       the CSS, fonts.gstatic.com serves the actual font files.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

  <!--
    FONT LOADING STRATEGY (OPTIONAL — uncomment if using Google Fonts)
    display=swap: text renders in a fallback font immediately, swaps to
    the web font when it arrives — prevents invisible text (FOIT).
    Uncomment these two lines and remove any @import from index.css:
  -->
  <!--
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" />

    media="print" onload="this.media='all'" />
  <noscript>

      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" />
  </noscript>
  -->

  <link rel="dns-prefetch" href="https://connect.facebook.net" />

  <!-- GA4 regional data collection endpoint -->
  <link rel="dns-prefetch" href="https://region1.google-analytics.com" />

  <!-- ═══════════════════════════════════════════════════════════════════

  <!-- ═══════════════════════════════════════════════════════════════════
       ANALYTICS — FACEBOOK PIXEL
       ID is injected from VITE_FB_PIXEL_ID at build time (set in Vercel
       Project Settings > Environment Variables). Vite replaces %VITE_*%
       placeholders in index.html during build — see trackingConfig.ts
       for the matching import.meta.env read used by the React app.

       Uses `defer` so the Pixel script NEVER blocks the LCP paint.
       The script creates window.fbq and queues events before the
       fbevents.js bundle downloads — no events are lost.

       ⚠  PageView is intentionally NOT fired here.
          PixelTracker in App.tsx fires it on every React Router
          navigation, correctly handling SPA page changes.
  ═══════════════════════════════════════════════════════════════════ -->
  <script defer>
    !function (f, b, e, v, n, t, s) {
      if (f.fbq) return;
      n = f.fbq = function () { n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments) };
      if (!f._fbq) f._fbq = n;
      n.push = n; n.loaded = !0; n.version = '2.0'; n.queue = [];
      t = b.createElement(e); t.async = !0; t.src = v;
      s = b.getElementsByTagName(e)[0]; s.parentNode.insertBefore(t, s);
    }(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '%VITE_FB_PIXEL_ID%');
    /* PageView fired per-route by PixelTracker in App.tsx */
  </script>

  <!-- ═══════════════════════════════════════════════════════════════════
       ANALYTICS — GOOGLE TAG MANAGER
       ID is injected from VITE_GTM_ID at build time (set in Vercel
       Project Settings > Environment Variables). See trackingConfig.ts
       for the matching import.meta.env read used by the React app.

       Uses `defer` so GTM NEVER blocks the LCP paint.
       The dataLayer array is pre-created so push() calls before GTM
       loads are queued and replayed once the container initialises.
       noscript fallback iframe is in <body> below.
  ═══════════════════════════════════════════════════════════════════ -->
  <script defer>
    (function (w, d, s, l, i) {
      w[l] = w[l] || [];
      w[l].push({ 'gtm.start': new Date().getTime(), event: 'gtm.js' });
      var f = d.getElementsByTagName(s)[0],
        j = d.createElement(s),
        dl = l != 'dataLayer' ? '&l=' + l : '';
      j.async = true;
      j.src = 'https://www.googletagmanager.com/gtm.js?id=' + i + dl;
      f.parentNode.insertBefore(j, f);
    })(window, document, 'script', 'dataLayer', '%VITE_GTM_ID%');
  </script>

</head>

<body>

  <!-- ═══════════════════════════════════════════════════════════════════
       NO-SCRIPT FALLBACKS
       Fires basic tracking for users / crawlers with JS disabled.
       IDs are injected from the same VITE_FB_PIXEL_ID / VITE_GTM_ID
       env vars as the inline scripts above.
  ═══════════════════════════════════════════════════════════════════ -->

  <!-- GTM noscript iframe (must be first element inside <body>) -->
  <noscript>
    <iframe src="https://www.googletagmanager.com/ns.html?id=%VITE_GTM_ID%" height="0" width="0"
      style="display:none;visibility:hidden" title="Google Tag Manager" aria-hidden="true">
    </iframe>
  </noscript>

  <!-- Facebook Pixel noscript image pixel -->
  <noscript>
    <img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=%VITE_FB_PIXEL_ID%&ev=PageView&noscript=1" alt="" aria-hidden="true" />
  </noscript>

  <!-- ═══════════════════════════════════════════════════════════════════
       REACT ROOT
       id="root" is the mount point for createRoot() in main.tsx.
       The noscript message is shown to search engines / users without JS.
  ═══════════════════════════════════════════════════════════════════ -->
  <div id="root">
    <noscript>
      <div
        style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif;text-align:center;padding:2rem;">
        <div>
          <h1 style="font-size:1.5rem;margin-bottom:1rem;color:#B07D6B;">Shiny Shades</h1>
          <p style="color:#6B5B55;">Please enable JavaScript to use this website.</p>
          <p style="margin-top:0.5rem;"><a href="https://www.facebook.com/Shiny Shadess" style="color:#B07D6B;">Visit us on
              Facebook</a></p>
        </div>
      </div>
    </noscript>
  </div>

  <!-- App entry point — Vite injects the hashed bundle URLs at build time -->
  <script type="module" src="/src/main.tsx"></script>

</body>
